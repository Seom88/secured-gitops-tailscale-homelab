apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth-key
  namespace: tailscale
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: operator-oauth
  data:
  - secretKey: client_id
    remoteRef:
      key: "tailscale/auth"
      property: "client_id"
  - secretKey: client_secret
    remoteRef:
      key: "tailscale/auth"
      property: "client_secret"