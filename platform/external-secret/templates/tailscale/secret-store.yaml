apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.vault.svc:8200"
      path: "secret"
      version: "v2"
      caBundle:
        type: Secret
        name: vault-tls
        key: ca.crt
        namespace: vault
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-tailscale-role"
          serviceAccountRef:
              name: "external-secrets"