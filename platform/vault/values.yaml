development:
  enabled: false

vault:
  global:
    enabled: true
    tlsDisable: false

  injector:
    enabled: true
    replicas: 2

    networkPolicy:
      enabled: true
      egress:
      - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              component: server
        ports:
        - port: 8200
          protocol: TCP

    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vault-agent-injector
                  component: webhook
              topologyKey: kubernetes.io/hostname

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  server:
    enabled: true

    networkPolicy:
      enabled: true
      egress:
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
        ports:
        - port: 8200
          protocol: TCP
        - port: 8201
          protocol: TCP
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets
        ports:
        - port: 8200
          protocol: TCP
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
        ports:
        - port: 8200
          protocol: TCP
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      # Kubernetes API server (for service_registration, autounseal, etc.)
      - ports:
          - port: 443
            protocol: TCP
      ingress:
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
        ports:
        - port: 8200
          protocol: TCP
        - port: 8201
          protocol: TCP
      - from:
        - namespaceSelector: {}
        ports:
        - port: 8200
          protocol: TCP
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
        ports:
        - port: 8200
          protocol: TCP
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets
        ports:
        - port: 8200
          protocol: TCP

    extraEnvironmentVars:
      VAULT_CACERT: /vault/userconfig/vault-tls/ca.crt
      VAULT_TLSCERT: /vault/userconfig/vault-tls/tls.crt
      VAULT_TLSKEY: /vault/userconfig/vault-tls/tls.key

    volumes:
    - name: vault-tls
      secret:
        secretName: vault-tls

    volumeMounts:
    - name: vault-tls
      mountPath: /vault/userconfig/vault-tls
      readOnly: true

    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi

    standalone:
      enabled: false

    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        setNodeId: true
        config: |
          ui = true

          listener "tcp" {
            tls_disable = 0
            address = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
            tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
            tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
          }

          storage "raft" {
            path = "/vault/data"
            {{- $namespace := .Release.Namespace }}
            {{- range $i := until 3 }}
            retry_join {
              leader_api_addr = "https://{{ template "vault.fullname" $ }}-{{ $i }}.{{ template "vault.fullname" $ }}-internal.{{ $namespace }}.svc.cluster.local:8200"
              leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
              leader_client_cert_file = "/vault/userconfig/vault-tls/tls.crt"
              leader_client_key_file = "/vault/userconfig/vault-tls/tls.key"
            }
            {{- end }}
          }

          disable_mlock = true

    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true"
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6

    livenessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true"
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6

    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: local-path

    auditStorage:
      enabled: true
      size: 10Gi
      storageClass: local-path

  ui:
    enabled: true
    serviceType: ClusterIP
