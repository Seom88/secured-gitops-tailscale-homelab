# vault-production-values.yaml - HashiCorp Vault Helm Chart
# Production config with TLS from OneUptime guide

vault:
  global:
    enabled: true
    tlsDisable: false

    injector:
      enabled: true
      replicas: 1

      #Network policies
      networkPolicy:
        enabled: true
        egress:
          # DNS resolution
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP
          # Vault server
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: vault
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: vault
                    component: server
            ports:
              - port: 8200
                protocol: TCP

      resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  server:
    enabled: true

    #Network policies
    networkPolicy:
      enabled: true
      egress:
        # DNS resolution (CoreDNS in kube-system)
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP
        # Kubernetes API Server (TokenReview validation)
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
              podSelector:
                matchLabels:
                  component: kube-apiserver
          ports:
            - port: 443
              protocol: TCP
            - port: 6443
              protocol: TCP
        # Tailscale namespace (responses to incoming connections)
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: tailscale
          ports:
            - port: 8200
              protocol: TCP
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: tailscale
          ports:
            - port: 8200
              protocol: TCP
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: external-secrets
          ports:
            - port: 8200
              protocol: TCP

    # Lifecycle hook to unseal Vault on startup (runs once and stops)
    postStart:
      - /bin/sh
      - -c
      - |
        # Wait for Vault to be ready to receive commands
        until vault status -address=https://127.0.0.1:8200 -ca-cert=/vault/userconfig/vault-tls/ca.crt -tls-server-name=vault > /dev/null 2>&1 || [ $? -eq 2 ]; do
          sleep 2
        done
        # Unseal if keys are available
        if [ -f /vault/unseal/key1 ]; then
          vault operator unseal -address=https://127.0.0.1:8200 -ca-cert=/vault/userconfig/vault-tls/ca.crt -tls-server-name=vault $(cat /vault/unseal/key1)
          vault operator unseal -address=https://127.0.0.1:8200 -ca-cert=/vault/userconfig/vault-tls/ca.crt -tls-server-name=vault $(cat /vault/unseal/key2)
          vault operator unseal -address=https://127.0.0.1:8200 -ca-cert=/vault/userconfig/vault-tls/ca.crt -tls-server-name=vault $(cat /vault/unseal/key3)
        fi

    volumes:
      - name: vault-tls
        secret:
          secretName: vault-tls
      - name: vault-unseal-keys
        secret:
          secretName: vault-unseal-keys
          optional: true

    volumeMounts:
      - name: vault-tls
        mountPath: /vault/userconfig/vault-tls
        readOnly: true
      - name: vault-unseal-keys
        mountPath: /vault/unseal
        readOnly: true

    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi

    # Standalone mode with file storage
    standalone:
      enabled: true
      replicas: 1

      config: |
        ui = true

        listener "tcp" {
          tls_disable = 0
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file = "/vault/userconfig/vault-tls/tls.key"
          tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
        }

        storage "file" {
          path = "/vault/data"
        }

        disable_mlock = true

    # Custom health endpoint for kubernetes probes
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

    livenessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

    # Persistent storage
    dataStorage:
      enabled: true
      size: 10Gi
      # storageClass: local-path

    # Audit log storage
    auditStorage:
      enabled: true
      size: 10Gi
      # storageClass: local-path

  ui:
    enabled: true
    serviceType: ClusterIP
