# vault-production-values.yaml - HashiCorp Vault Helm Chart
# Production config with TLS from OneUptime guide

vault:
  global:
    enabled: true
    tlsDisable: false

  injector:
    enabled: true
    replicas: 1
    
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  server:
    enabled: true

    # Auto-unseal sidecar
    extraContainers:
      - name: vault-unsealer
        image: hashicorp/vault:1.21.4
        imagePullPolicy: IfNotPresent
        env:
          - name: VAULT_ADDR
            value: "https://localhost:8200"
          - name: VAULT_SKIP_VERIFY
            value: "true"
          - name: UNSEAL_KEY_1
            valueFrom:
              secretKeyRef:
                name: vault-unseal-keys
                key: key1
          - name: UNSEAL_KEY_2
            valueFrom:
              secretKeyRef:
                name: vault-unseal-keys
                key: key2
          - name: UNSEAL_KEY_3
            valueFrom:
              secretKeyRef:
                name: vault-unseal-keys
                key: key3
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting Vault Unsealer loop..."
            while true; do
              vault status > /dev/null 2>&1
              STATUS=$?
              if [ $STATUS -eq 2 ]; then
                echo "$(date): Vault is sealed. Unsealing..."
                vault operator unseal $UNSEAL_KEY_1
                vault operator unseal $UNSEAL_KEY_2
                vault operator unseal $UNSEAL_KEY_3
              elif [ $STATUS -eq 0 ]; then
                # Already unsealed
                true
              else
                echo "$(date): Waiting for Vault to be ready..."
              fi
              sleep 30
            done
    
    # Mount certificates TLS
    extraVolumes:
      - type: secret
        name: vault-tls
    
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi

    # Standalone mode with file storage
    standalone:
      enabled: true
      replicas: 1
      
      config: |
        ui = true
        
        listener "tcp" {
          tls_disable = 0
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file = "/vault/userconfig/vault-tls/tls.key"
          tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
        }
        
        storage "file" {
          path = "/vault/data"
        }
        
        disable_mlock = true

    # Custom health endpoint for kubernetes probes
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

    livenessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

    # Persistent storage
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: standard

    # Audit log storage
    auditStorage:
      enabled: true
      size: 10Gi
      storageClass: standard

  ui:
    enabled: true
    serviceType: ClusterIP

# The Tailscale Ingress resource has sync-wave: "-1" annotation in its template.
# ArgoCD applies it last (after Tailscale operator is ready), even within this Application.
tailscale:
  enabled: true

certificates:
  enabled: true