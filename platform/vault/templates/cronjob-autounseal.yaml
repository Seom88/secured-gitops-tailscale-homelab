apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-autounseal
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-autounseal
    app.kubernetes.io/component: operations
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vault-autounseal
            app.kubernetes.io/component: operations
        spec:
          serviceAccountName: vault-autounseal
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
 
          containers:
            - name: autounseal
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
 
              command: ["/bin/sh", "/scripts/unseal.sh"]
 
              env:
                - name: VAULT_NAMESPACE
                  value: "vault"
                - name: VAULT_TLS_SERVER_NAME
                  value: "vault"
 
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
 
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
 
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
 
          volumes:
            - name: script
              configMap:
                name: vault-autounseal-script
                defaultMode: 0555
 
