apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config-monitoring
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: Never
      containers:
      - name: vault-config
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -ec
        - |
          set -e

          # Wait for Vault to be unsealed and responsive
          echo "Waiting for Vault to be ready..."
          until kubectl exec -n vault "$(kubectl get pod -n vault -l app.kubernetes.io/name=vault,component=server -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)" -- /bin/sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt vault status -tls-server-name=vault 2>/dev/null | grep -q 'Sealed.*false'" 2>/dev/null; do
            echo "Vault not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Vault is ready!"

          VAULT_POD=$(kubectl get pod -n vault -l app.kubernetes.io/name=vault,component=server -o jsonpath="{.items[0].metadata.name}")
          RELEASE_NAME=$(kubectl get pod $VAULT_POD -n vault -o jsonpath="{.metadata.labels['app\.kubernetes\.io/instance']}")
          SECRET_NAME="${RELEASE_NAME}-unseal-keys"
          ROOT_TOKEN=$(kubectl get secret $SECRET_NAME -n vault -o jsonpath='{.data.root-token}' | base64 -d)

          # Write monitoring policy
          echo "Writing monitoring-policy..."
          kubectl exec -i -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault policy write -tls-server-name=vault monitoring-policy -" << 'EOF'
          path "secret/data/grafana/*" {
            capabilities = ["read"]
          }
          EOF

          # Create/update Kubernetes auth role for eso-monitoring
          echo "Configuring auth/kubernetes/role/eso-monitoring..."
          kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault auth/kubernetes/role/eso-monitoring bound_service_account_names=vault-external-secrets,vault-dev-external-secrets,external-secrets bound_service_account_namespaces=external-secrets policies=monitoring-policy ttl=24h" > /dev/null 2>&1

          # Seed grafana admin secret with generated password
          echo "Seeding secret/grafana/admin..."
          if kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault kv get -tls-server-name=vault secret/grafana/admin" > /dev/null 2>&1; then
            echo "Secret exists, skipping"
          else
            RANDOM_VAL=$(kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault -format=json sys/tools/random bytes=32" | jq -r .data.random_bytes)
            kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault kv put -tls-server-name=vault secret/grafana/admin password=$RANDOM_VAL user=admin" > /dev/null 2>&1
          fi

          echo "Configuration complete!"
