apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config-seaweedfs
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: Never
      containers:
      - name: vault-config
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -ec
        - |
          set -e

          # Wait for Vault to be unsealed and responsive
          echo "Waiting for Vault to be ready..."
          until kubectl exec -n vault "$(kubectl get pod -n vault -l app.kubernetes.io/name=vault,component=server -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)" -- /bin/sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt vault status -tls-server-name=vault 2>/dev/null | grep -q 'Sealed.*false'" 2>/dev/null; do
            echo "Vault not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Vault is ready!"

          VAULT_POD=$(kubectl get pod -n vault -l app.kubernetes.io/name=vault,component=server -o jsonpath="{.items[0].metadata.name}")
          RELEASE_NAME=$(kubectl get pod $VAULT_POD -n vault -o jsonpath="{.metadata.labels['app\.kubernetes\.io/instance']}")
          SECRET_NAME="${RELEASE_NAME}-unseal-keys"
          ROOT_TOKEN=$(kubectl get secret $SECRET_NAME -n vault -o jsonpath='{.data.root-token}' | base64 -d)

          # Write seaweedfs policy
          echo "Writing seaweedfs-policy..."
          kubectl exec -i -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault policy write -tls-server-name=vault seaweedfs-policy -" << 'EOF'
          path "secret/data/seaweedfs/*" {
            capabilities = ["read"]
          }
          EOF

          # Create/update Kubernetes auth role for eso-seaweedfs
          echo "Configuring auth/kubernetes/role/eso-seaweedfs..."
          kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault auth/kubernetes/role/eso-seaweedfs bound_service_account_names=vault-external-secrets,vault-dev-external-secrets,external-secrets bound_service_account_namespaces=external-secrets policies=seaweedfs-policy ttl=24h" > /dev/null 2>&1

          # Seed seaweedfs S3 secret with generated credentials
          echo "Seeding secret/seaweedfs/s3..."
          if kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault kv get -tls-server-name=vault secret/seaweedfs/s3" > /dev/null 2>&1; then
            echo "Secret exists, skipping"
          else
            # Generate admin credentials
            ADMIN_ACCESS_KEY=$(kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault -format=json sys/tools/random bytes=16" | jq -r .data.random_bytes | base64 | tr -d '=/+' | head -c 20)
            ADMIN_SECRET_KEY=$(kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault -format=json sys/tools/random bytes=32" | jq -r .data.random_bytes | base64 | tr -d '=/+' | head -c 40)

            # Generate read-only credentials
            READ_ACCESS_KEY=$(kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault -format=json sys/tools/random bytes=16" | jq -r .data.random_bytes | base64 | tr -d '=/+' | head -c 20)
            READ_SECRET_KEY=$(kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault -format=json sys/tools/random bytes=32" | jq -r .data.random_bytes | base64 | tr -d '=/+' | head -c 40)

            # Build SeaweedFS S3 JSON config
            S3_CONFIG="{\"identities\":[{\"name\":\"anvAdmin\",\"credentials\":[{\"accessKey\":\"$ADMIN_ACCESS_KEY\",\"secretKey\":\"$ADMIN_SECRET_KEY\"}],\"actions\":[\"Admin\",\"Read\",\"Write\"]},{\"name\":\"anvReadOnly\",\"credentials\":[{\"accessKey\":\"$READ_ACCESS_KEY\",\"secretKey\":\"$READ_SECRET_KEY\"}],\"actions\":[\"Read\"]}]}"

            # Store in Vault
            kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault kv put -tls-server-name=vault secret/seaweedfs/s3 s3_config='$S3_CONFIG' admin_access_key=$ADMIN_ACCESS_KEY admin_secret_key=$ADMIN_SECRET_KEY read_access_key=$READ_ACCESS_KEY read_secret_key=$READ_SECRET_KEY" > /dev/null 2>&1
          fi

          echo "Configuration complete!"
