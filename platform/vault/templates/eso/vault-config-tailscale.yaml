apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config-tailscale
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: Never
      containers:
      - name: vault-config
        image: bitnami/kubectl:latest
        env:
        - name: TS_CLIENT_ID
          value: "ChangeMeSecret"
        - name: TS_CLIENT_SECRET
          value: "ChangeMeSecret"
        command:
        - /bin/bash
        - -ec
        - |
          set -e

          VAULT_POD=$(kubectl get pod -n vault -l app.kubernetes.io/name=vault,component=server -o jsonpath="{.items[0].metadata.name}")
          RELEASE_NAME=$(kubectl get pod $VAULT_POD -n vault -o jsonpath="{.metadata.labels['app\.kubernetes\.io/instance']}")
          SECRET_NAME="${RELEASE_NAME}-unseal-keys"
          ROOT_TOKEN=$(kubectl get secret $SECRET_NAME -n vault -o jsonpath='{.data.root-token}' | base64 -d)

          # Write tailscale policy
          echo "Writing tailscale-policy..."
          kubectl exec -i -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault policy write -tls-server-name=vault tailscale-policy -" << 'EOF'
          path "secret/data/tailscale/*" {
            capabilities = ["read"]
          }
          EOF

          # Create/update Kubernetes auth role for eso-tailscale
          echo "Configuring auth/kubernetes/role/eso-tailscale..."
          kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault write -tls-server-name=vault auth/kubernetes/role/eso-tailscale bound_service_account_names=vault-external-secrets,vault-dev-external-secrets,external-secrets bound_service_account_namespaces=external-secrets policies=tailscale-policy ttl=24h" > /dev/null 2>&1

          # Seed tailscale auth secret
          echo "Seeding secret/tailscale/auth..."
          if kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault kv get -tls-server-name=vault secret/tailscale/auth" > /dev/null 2>&1; then
            echo "Secret exists, skipping"
          else
            kubectl exec -n vault "$VAULT_POD" -- /bin/sh -c "VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt VAULT_TOKEN=$ROOT_TOKEN vault kv put -tls-server-name=vault secret/tailscale/auth client_id=$TS_CLIENT_ID client_secret=$TS_CLIENT_SECRET" > /dev/null 2>&1
          fi

          echo "Configuration complete!"
