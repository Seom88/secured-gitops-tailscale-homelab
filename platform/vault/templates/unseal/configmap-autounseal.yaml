apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-autounseal-script
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-autounseal
    app.kubernetes.io/component: operations
data:
  unseal.sh: |
    #!/bin/sh
    set -e

    NAMESPACE="${VAULT_NAMESPACE:-vault}"
    TLS_SERVER_NAME="${VAULT_TLS_SERVER_NAME:-vault}"
    KUBECTL="kubectl"

    echo "[autounseal] Starting pod review in namespace: $NAMESPACE"

    # Get Vault server pod list with retry.
    echo "[autounseal] Looking for Vault pods..."
    RETRIES=12
    SLEEP=5
    i=1
    while [ "$i" -le "$RETRIES" ]; do
      PODS=$($KUBECTL get pods -n "$NAMESPACE" \
        -l app.kubernetes.io/name=vault,component=server \
        -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)
      
      if [ -n "$PODS" ]; then
        echo "[autounseal] Found Vault pods: $PODS"
        break
      fi

      if [ "$i" -eq "$RETRIES" ]; then
        echo "[autounseal] ERROR: No Vault pods found after $((RETRIES * SLEEP)) seconds."
        exit 1
      fi
      echo "[autounseal] No Vault pods yet (attempt $i/$RETRIES), retrying in ${SLEEP}s..."
      sleep "$SLEEP"
      i=$((i + 1))
    done

    # Derive the secret name from the Helm release label on the first pod.
    # init-vault.sh creates it as "{release-name}-unseal-keys", so we do the same.
    FIRST_POD=$(echo "$PODS" | awk '{print $1}')
    RELEASE_NAME=$($KUBECTL get pod "$FIRST_POD" -n "$NAMESPACE" \
      -o jsonpath='{.metadata.labels.app\.kubernetes\.io/instance}' 2>/dev/null)

    if [ -z "$RELEASE_NAME" ]; then
      echo "[autounseal] ERROR: Could not determine Helm release name from pod labels."
      exit 1
    fi

    SECRET_NAME="${RELEASE_NAME}-unseal-keys"
    echo "[autounseal] Using secret: $SECRET_NAME"

    # Read unseal keys ONCE (never printed in logs)
    KEY1=$($KUBECTL get secret "$SECRET_NAME" -n "$NAMESPACE" \
      -o jsonpath='{.data.key1}' 2>/dev/null | base64 -d)
    KEY2=$($KUBECTL get secret "$SECRET_NAME" -n "$NAMESPACE" \
      -o jsonpath='{.data.key2}' 2>/dev/null | base64 -d)
    KEY3=$($KUBECTL get secret "$SECRET_NAME" -n "$NAMESPACE" \
      -o jsonpath='{.data.key3}' 2>/dev/null | base64 -d)

    if [ -z "$KEY1" ] || [ -z "$KEY2" ] || [ -z "$KEY3" ]; then
      echo "[autounseal] Secret '$SECRET_NAME' not found or keys are empty — Vault may not be initialized yet. Skipping."
      exit 0
    fi

    for POD in $PODS; do
      echo "[autounseal] Checking pod: $POD"

      # Check the pod is in Running phase (not Pending/Succeeded/Failed).
      PHASE=$($KUBECTL get pod "$POD" -n "$NAMESPACE" \
        -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")

      if [ "$PHASE" != "Running" ]; then
        echo "[autounseal] Pod $POD is not in Running phase ($PHASE), skipping."
        continue
      fi

      # Check the container is actually running.
      CONTAINER=$($KUBECTL get pod "$POD" -n "$NAMESPACE" \
        -o jsonpath='{.status.containerStatuses[0].state.running}' 2>/dev/null)

      if [ -z "$CONTAINER" ]; then
        echo "[autounseal] Pod $POD container is not running (CrashLoopBackOff or waiting), skipping."
        continue
      fi

      # Get current seal status (exit code 2 when sealed is expected — suppress it)
      STATUS=$($KUBECTL exec -n "$NAMESPACE" "$POD" -- \
        sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
               vault status -format=json -tls-server-name=$TLS_SERVER_NAME || true" \
        2>/dev/null)

      if [ -z "$STATUS" ]; then
        echo "[autounseal] Pod $POD did not respond, skipping."
        continue
      fi

      SEALED=$(echo "$STATUS" | grep -o '"sealed":[^,}]*' | grep -o 'true\|false')
      INITIALIZED=$(echo "$STATUS" | grep -o '"initialized":[^,}]*' | grep -o 'true\|false')

      if [ "$INITIALIZED" != "true" ]; then
        echo "[autounseal] Pod $POD is not initialized yet, skipping."
        continue
      fi

      if [ "$SEALED" = "true" ]; then
        echo "[autounseal] Pod $POD is SEALED. Unsealing..."

        # Unseal keys are never printed in logs
        $KUBECTL exec -n "$NAMESPACE" "$POD" -- \
          sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
                 vault operator unseal -tls-server-name=$TLS_SERVER_NAME '$KEY1'" \
          > /dev/null 2>&1

        $KUBECTL exec -n "$NAMESPACE" "$POD" -- \
          sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
                 vault operator unseal -tls-server-name=$TLS_SERVER_NAME '$KEY2'" \
          > /dev/null 2>&1

        $KUBECTL exec -n "$NAMESPACE" "$POD" -- \
          sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
                 vault operator unseal -tls-server-name=$TLS_SERVER_NAME '$KEY3'" \
          > /dev/null 2>&1

        # Verify unseal was effective before reporting success
        NEW_STATUS=$($KUBECTL exec -n "$NAMESPACE" "$POD" -- \
          sh -c "env VAULT_CACERT=/vault/userconfig/vault-tls/ca.crt \
                 vault status -format=json -tls-server-name=$TLS_SERVER_NAME || true" \
          2>/dev/null)
        NEW_SEALED=$(echo "$NEW_STATUS" | grep -o '"sealed":[^,}]*' | grep -o 'true\|false')

        if [ "$NEW_SEALED" = "false" ]; then
          echo "[autounseal] Pod $POD unsealed successfully."
        else
          echo "[autounseal] ERROR: Pod $POD is still sealed after unseal attempt."
          exit 1
        fi
      else
        echo "[autounseal] Pod $POD is already unsealed."
      fi
    done

    echo "[autounseal] Review complete."
    exit 0
