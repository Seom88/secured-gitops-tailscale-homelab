developmentApp:
  enabled: false

# Configuration for the Loki subchart
loki:
  # Deployment mode: SingleBinary (simple), SimpleScalable (medium), Distributed (large)
  deploymentMode: SingleBinary

  # Number of replicas
  singleBinary:
    replicas: 1
    persistence:
      size: 5Gi
      storageClass: ""
    # Inject SeaweedFS S3 credentials from Vault via ESO
    extraEnvFrom:
      - secretRef:
          name: loki-s3-credentials

  # Component replicas (set to 0 for Monolithic mode)
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0

  # Caching
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  # Helm test
  test:
    enabled: false

  # Loki application configuration
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: s3
      s3:
        endpoint: http://seaweedfs-s3.seaweedfs.svc:8333
        region: us-east-1
        s3ForcePathStyle: true
        insecure: true
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
      filesystem:
        chunks_directory: /var/loki/chunks
        rules_directory: /var/loki/rules

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    # Disable test schema to use our custom schemaConfig
    useTestSchema: false

  # Enable gateway (default is true, but we ensure it)
  gateway:
    enabled: true
    service:
      port: 80
      type: ClusterIP

# Configuration for the Kube-Prometheus-Stack subchart
kube-prometheus-stack:
  # Grafana configuration
  grafana:
    admin:
      existingSecret: "grafana-admin-credentials"
      userKey: admin-user
      passwordKey: admin-password

    # Add Loki as a data source
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://monitoring-loki-gateway.monitoring.svc.cluster.local
        access: proxy
        # Even with auth_enabled: false, Loki requires an org ID header
        # This is a known quirk - the value can be anything since auth is disabled
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "fake"

    # Native Ingress configuration for Grafana
    ingress:
      enabled: false
      ingressClassName: tailscale
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      hosts:
        - grafana
      tls:
        - hosts:
            - grafana

  # Prometheus persistent storage & native Ingress:
  prometheus:
    prometheusSpec:
      retention: 15d

    # Native Ingress configuration for Prometheus
    ingress:
      enabled: false
      ingressClassName: tailscale
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      hosts:
        - prometheus
      paths:
        - /
      pathType: Prefix
      tls:
        - hosts:
            - prometheus

  # Alertmanager configuration:
  alertmanager:
    alertmanagerSpec:
      replicas: 1
