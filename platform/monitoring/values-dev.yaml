development:
  enabled: true

# Configuration for the Kube-Prometheus-Stack subchart
kube-prometheus-stack:
  # Grafana configuration
  grafana:
    # Add Loki as a data source
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://monitoring-dev-loki-gateway.monitoring.svc.cluster.local
        access: proxy
        # Even with auth_enabled: false, Loki requires an org ID header
        # This is a known quirk - the value can be anything since auth is disabled
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "fake"
