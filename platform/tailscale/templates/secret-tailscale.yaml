apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth-key
  namespace: tailscale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-tailscale
    kind: SecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: client_id
    remoteRef:
      key: "tailscale/auth"
      property: "client_id"
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      nullBytePolicy: Ignore 
  - secretKey: client_secret
    remoteRef:
      key: "tailscale/auth"
      property: "client_secret"
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      nullBytePolicy: Ignore 