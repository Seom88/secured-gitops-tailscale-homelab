apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-tailscale
  namespace: tailscale
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: {{ .Values.vaultAddress | default "https://vault.vault.svc:8200" }}
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: vault-tls
        key: ca.crt
        namespace: vault
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-tailscale"
          # No serviceAccountRef — ESO uses its own pod SA for Vault auth
