{{- if .Values.nginx.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  # annotations:
  #   tailscale.com/funnel: "true"
  #   tailscale.com/tags: "tag:k8s,tag:nginx"
spec:
  # defaultBackend:
  #   service:
  #     name: nginx
  #     port:
  #       number: 80
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
  tls:
  - hosts:
    - nginx{{- if .Values.developmentApp.enabled }}-dev{{- end }}
{{- end }}