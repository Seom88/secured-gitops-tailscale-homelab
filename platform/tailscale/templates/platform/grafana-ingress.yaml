{{- if .Values.grafana.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring{{- if .Values.developmentApp.enabled }}-dev{{- end }}-grafana
                port:
                  name: http-web
  tls:
  - hosts:
    - {{ if .Values.developmentApp.enabled }}dev-grafana{{- else }}grafana{{- end }}
{{- end }}
