{{- if .Values.vault.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: vault
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault{{- if .Values.development.enabled }}-dev{{- end }}
                port:
                  name: https
  tls:
  - hosts:
    - {{ if .Values.development.enabled }}dev-vault{{- else }}vault{{- end }}
{{- end }}