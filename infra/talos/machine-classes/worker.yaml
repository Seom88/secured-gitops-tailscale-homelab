---
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: proxmox-worker
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox
    kernelargs: []
    metavalues: []
    providerdata: |
      cores: 16
      sockets: 1
      memory: 64000
      disk_size: 450
      network_bridge: vmbr0
      storage_selector: name == "ssdpool"
      # Disk performance (SSD/NVMe optimization)
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring
      # 10G storage network (vmbr1 -> ens19 in Talos)
      additional_nics:
        - bridge: vmbr1
          firewall: false