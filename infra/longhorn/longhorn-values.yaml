# Longhorn Helm values
# Used by infra/init-infra.sh for direct Helm install (NOT via GitOps)
# These are top-level values for the upstream longhorn/longhorn chart
# (no longhorn: wrapper — that was only needed as a Helm dependency subchart)

defaultSettings:
  defaultReplicaCount: 3

  replicaSoftAntiAffinity: false

  replicaAutoBalance: "least-effort"

  storageReservedPercentageForDefaultDisk: 5

  storageMinimalAvailablePercentage: 15

  storageOverProvisioningPercentage: 200

  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod

  defaultDataPath: /var/lib/longhorn

  defaultLonghornStaticStorageClass: longhorn-static

persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
  migratable: true
  reclaimPolicy: Delete

ingress:
  enabled: false
  ingressClassName: ""
  host: ""
  tls: false
  tlsSecret: ""
