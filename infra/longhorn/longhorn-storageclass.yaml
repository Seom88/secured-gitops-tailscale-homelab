# Additional StorageClass for Longhorn volumes
# Applied by infra/init-infra.sh after Longhorn is installed and ready
# Longhorn's default StorageClass (created by the Helm chart) handles most cases.
# This one exists for volumes that need explicit Retain + SSD/NVME diskSelector.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-prod
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  diskSelector: "ssd,nvme"
  migratable: "true"
