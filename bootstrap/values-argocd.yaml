# ArgoCD Helm chart values
# Used by: helm upgrade --install argocd argo/argo-cd -f bootstrap/values-argocd.yaml
configs:
  params:
    # Disable TLS on the server (TLS is terminated at the ingress/proxy level)
    server.insecure: true
  cm:
    # Custom health checks
    resource.customizations: |
      external-secrets.io/ClusterSecretStore:
        health.lua: |
          hs = {}
          hs.status = "Progressing"
          hs.message = "Waiting for ClusterSecretStore to be ready"
          if obj.status ~= nil then
            for _, condition in ipairs(obj.status.conditions or {}) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = "ClusterSecretStore is ready"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "ClusterSecretStore not ready"
                end
                return hs
              end
            end
          end
          return hs
      external-secrets.io/ExternalSecret:
        health.lua: |
          hs = {}
          hs.status = "Progressing"
          hs.message = "Waiting for ExternalSecret to sync"
          if obj.status ~= nil then
            for _, condition in ipairs(obj.status.conditions or {}) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = "ExternalSecret synced successfully"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "ExternalSecret sync failed"
                end
                return hs
              end
            end
          end
          return hs
      argoproj.io/Application:
        health.lua: |
          hs = {}
          hs.status = "Progressing"
          hs.message = "Waiting for Application to be healthy"
          if obj.status ~= nil then
            if obj.status.health ~= nil then
              hs.status = obj.status.health.status
              hs.message = obj.status.health.message or hs.message
            end
          end
          return hs
