{{- if .Values.platformApps.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops{{- if .Values.developmentApps.enabled }}-dev{{- end }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ if .Values.developmentApps.enabled }}dev{{ else }}main{{ end }}
    path: gitops
    helm:
      valueFiles:
        - values.yaml
        {{- if .Values.developmentApps.enabled }}
        - values-dev.yaml
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
{{- end }}
