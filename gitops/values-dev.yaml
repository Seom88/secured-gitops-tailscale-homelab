# App-of-Apps chart values
repoURL: https://github.com/Seom88/secured-gitops-tailscale-homelab.git
platformApps:
  enabled: true
  local:
  - name: vault
    namespace: vault
    wave: 2
    path: platform/vault
  - name: monitoring
    path: platform/monitoring
    namespace: monitoring
    wave: 2
  - name: tailscale
    path: platform/tailscale
    namespace: tailscale
    wave: 3
  helm:
  - name: cert-manager
    namespace: cert-manager
    wave: 0
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    version: v1.17.2
    values:
      crds:
        enabled: true
      global:
        leaderElection:
          namespace: cert-manager
  - name: external-secrets
    namespace: external-secrets
    wave: 0
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    version: 2.4.1

developmentApps:
  enabled: true
