apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    chart: tailscale-operator
    repoURL: https://pkgs.tailscale.com/helmcharts
    targetRevision: 1.96.5
    helm:
      releaseName: tailscale-operator
      values: |
        tailscale-operator:
          oauth:
            clientID:
              valueFrom:
                secretKeyRef:
                  name: operator-oauth
                  key: client_id
            clientSecret:
              valueFrom:
                secretKeyRef:
                  name: operator-oauth
                  key: client_secret
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true